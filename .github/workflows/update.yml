name: deploy.yml
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: 22
          request_pty: true
          script_stop: true
          key: ${{ secrets.KEY }}
          script: |
            become petscan-list bash -lc "
              ~/shs/update.sh &&
              toolforge-jobs run pipup --image python3.11 --command ~/shs/pip.sh --wait
              toolforge-webservice python3.11 restart &&
              echo ''
            "
